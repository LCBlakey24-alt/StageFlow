<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet" />
    <style>
      .brand,
      .hero h1,
      main > .card h1 {
        font-family: 'Audiowide', Inter, ui-sans-serif, system-ui, sans-serif;
        letter-spacing: -0.025em;
      }
      .hero h1 {
        line-height: 1.08;
      }
    </style>
    <title>StageFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('click', function (event) {
        const button = event.target.closest('button');
        if (!button) return;
        const label = (button.textContent || '').trim().toLowerCase();
        const isReset = label === 'reset' || label === 'reset app data';
        const isDelete = label === 'delete';
        if (isReset && !window.confirm('Reset StageFlow demo data on this device? This clears your local test changes.')) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
        if (isDelete && !window.confirm('Delete this lesson and its linked learners from this demo?')) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
      }, true);
    </script>
    <script type="module" src="/app/main.jsx"></script>
  </body>
</html>
