<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet" />
    <style>
      .brand,
      .hero h1,
      main > .card h1 {
        font-family: 'Audiowide', Inter, ui-sans-serif, system-ui, sans-serif;
        letter-spacing: -0.025em;
      }
      .hero h1 { line-height: 1.08; }
      .stageflow-cert-manager { border-top: 5px solid #f97316; }
      .stageflow-cert-row {
        display: grid;
        grid-template-columns: minmax(0,1fr) auto auto auto;
        gap: 8px;
        align-items: center;
        border: 1px solid #d9dee8;
        border-left: 5px solid #2563eb;
        border-radius: 5px;
        padding: 10px;
        margin-top: 8px;
        background: #fff;
      }
      .stageflow-cert-row strong { display: block; }
      .stageflow-cert-row small { color: #64748b; font-weight: 900; }
      .stageflow-cert-editor {
        border: 1px solid #d9dee8;
        border-radius: 5px;
        padding: 12px;
        margin-top: 12px;
        background: #f8fafc;
      }
      .certificate-builder-preview {
        position: relative;
        overflow: hidden;
        border: 1px solid #d9dee8;
        border-radius: 6px;
        background: #f8fafc;
        min-height: 260px;
        display: grid;
        place-items: center;
      }
      .certificate-builder-preview img {
        width: 100%;
        height: auto;
        display: block;
      }
      .certificate-builder-text {
        position: absolute;
        transform: translate(-50%, -50%);
        font-weight: 900;
        white-space: nowrap;
        text-align: center;
        text-shadow: 0 1px 2px rgba(255,255,255,.85);
        pointer-events: none;
      }
      .certificate-builder-empty {
        padding: 28px;
        text-align: center;
        color: #64748b;
        font-weight: 900;
      }
      .cert-control-panel {
        border: 1px solid #d9dee8;
        border-left: 4px solid #f97316;
        border-radius: 4px;
        padding: 10px;
        margin-top: 10px;
        background: #fff;
      }
      .cert-control-panel h3 { margin-bottom: 8px; }
      .cert-control-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
      }
      .cert-control-grid button,
      .stageflow-cert-row button {
        border: 1px solid #d9dee8;
        background: #fff;
        color: #0f172a;
        border-radius: 4px;
        padding: 9px 8px;
        font-weight: 1000;
      }
      .cert-control-grid button:hover,
      .stageflow-cert-row button:hover { border-color: #f97316; }
      .cert-delete { color: #dc2626 !important; }
      .certificate-rule-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid #d9dee8;
        border-left: 4px solid #f97316;
        border-radius: 4px;
        padding: 9px 10px;
        margin-top: 8px;
        background: #fff;
        font-weight: 900;
      }
      .certificate-rule-row span:last-child { color: #64748b; text-align: right; }
      @media (max-width: 850px) {
        .rail button:nth-child(2):after {
          content: 'Timetable' !important;
          font-size: 9px !important;
        }
        .stageflow-cert-row { grid-template-columns: 1fr; }
        .certificate-rule-row { display: block; }
        .certificate-rule-row span:last-child { display: block; text-align: left; margin-top: 4px; }
      }
    </style>
    <title>StageFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('click', function (event) {
        const button = event.target.closest('button');
        if (!button) return;
        const label = (button.textContent || '').trim().toLowerCase();
        const isReset = label === 'reset' || label === 'reset app data';
        const isDelete = label === 'delete';
        if (isReset && !window.confirm('Reset StageFlow demo data on this device? This clears your local test changes.')) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
        if (isDelete && !window.confirm('Delete this lesson and its linked learners from this demo?')) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
      }, true);

      function distanceValue(value) {
        return parseInt(String(value || '0').replace('m', ''), 10) || 0;
      }
      function distanceStrokeFromLabel(label) {
        const text = String(label || '').toLowerCase();
        if (text.includes('front')) return 'front';
        if (text.includes('back')) return 'back';
        return '';
      }
      function criteriaMatchesDistance(criteria, stroke, metres) {
        const text = String(criteria || '').toLowerCase();
        const match = text.match(/(\d+)\s*m/);
        if (!match) return false;
        const needed = Number(match[1]);
        if (needed > metres) return false;
        const frontLike = text.includes('front') || text.includes('crawl');
        const backLike = text.includes('back') || text.includes('backstroke');
        const anyStroke = text.includes('choice of stroke') || text.includes('optional') || text.includes('distance achieved');
        if (stroke === 'front') return frontLike || anyStroke;
        if (stroke === 'back') return backLike || anyStroke;
        return false;
      }
      function clickMatchingPassButtons(stroke, metres) {
        document.querySelectorAll('.criteria').forEach(card => {
          const label = card.querySelector('b')?.textContent || '';
          if (!criteriaMatchesDistance(label, stroke, metres)) return;
          const buttons = Array.from(card.querySelectorAll('button'));
          const passButton = buttons.find(btn => (btn.textContent || '').trim().toLowerCase() === 'pass');
          if (passButton && !passButton.className.includes('org')) passButton.click();
        });
      }
      function stageOrderValue(text) {
        const label = String(text || '').toLowerCase();
        const match = label.match(/stage\s*(\d+)/);
        if (match) return Number(match[1]);
        if (label.includes('self rescue')) return 900;
        if (label.includes('water safety')) return 901;
        if (label.includes('award')) return 902;
        return 800;
      }
      function reorderStageSelects() {
        document.querySelectorAll('.field').forEach(field => {
          const label = field.querySelector('label')?.textContent || '';
          if (!label.toLowerCase().includes('current working stage')) return;
          const select = field.querySelector('select');
          if (!select || select.dataset.stageSorted === 'yes') return;
          const current = select.value;
          const options = Array.from(select.options).sort((a, b) => stageOrderValue(a.textContent) - stageOrderValue(b.textContent));
          options.forEach(option => select.appendChild(option));
          select.value = current;
          select.dataset.stageSorted = 'yes';
        });
      }

      const CERT_LIST_KEY = 'stageflow-certificate-templates';
      const CERT_SINGLE_KEY = 'stageflow-certificate-template';
      const CERT_ACTIVE_KEY = 'stageflow-certificate-active';
      function certTemplateDefaults() {
        return {
          id: 'cert-' + Date.now(),
          name: 'Stage certificate template',
          award: 'Stage 1',
          font: 'Arial',
          fontSize: 36,
          dateFontSize: 20,
          colour: '#1e3a8a',
          nameX: 50,
          nameY: 43,
          dateX: 50,
          dateY: 64,
          showDate: true,
          image: ''
        };
      }
      function normaliseCert(template) {
        return { ...certTemplateDefaults(), ...(template || {}), id: template?.id || ('cert-' + Date.now()) };
      }
      function loadCertTemplates() {
        let list = [];
        try { list = JSON.parse(localStorage.getItem(CERT_LIST_KEY) || '[]'); } catch { list = []; }
        if (!Array.isArray(list)) list = [];
        if (!list.length) {
          try {
            const old = JSON.parse(localStorage.getItem(CERT_SINGLE_KEY) || '{}');
            if (old && (old.image || old.name || old.award)) list = [{ ...certTemplateDefaults(), ...old, id: 'cert-' + Date.now() }];
          } catch {}
        }
        return list.map(normaliseCert);
      }
      function saveCertTemplates(list) {
        localStorage.setItem(CERT_LIST_KEY, JSON.stringify(list));
      }
      function activeCertId(list) {
        const saved = localStorage.getItem(CERT_ACTIVE_KEY);
        return list.some(t => t.id === saved) ? saved : (list[0]?.id || '');
      }
      function setActiveCertId(id) {
        localStorage.setItem(CERT_ACTIVE_KEY, id || '');
      }
      function stageNumber(stage) {
        const match = String(stage || '').match(/Stage\s*(\d+)/i);
        return match ? Number(match[1]) : 0;
      }
      function loadStageFlowState() {
        try { return JSON.parse(localStorage.getItem('stageflow-state') || '{}'); } catch { return {}; }
      }
      function nationalCurriculumEarned(learner) {
        const nc = learner?.nc || {};
        const required = ['25m front crawl', '25m backstroke', '10m butterfly or breaststroke', 'Water Safety Award completed'];
        return required.every(item => !!nc[item]);
      }
      function certificateEligibilityRows() {
        const app = loadStageFlowState();
        const learners = Array.isArray(app.learners) ? app.learners : [];
        if (!learners.length) return [];
        return learners.map(learner => {
          const stage = stageNumber(learner.stage) ? learner.stage : 'No stage certificate yet';
          const nc = nationalCurriculumEarned(learner) ? ' + National Curriculum' : '';
          return { name: learner.name || 'Unnamed learner', award: `${stage}${nc}` };
        });
      }
      function clampCert(value, min, max) {
        return Math.max(min, Math.min(max, Number(value) || 0));
      }
      function escapeHtml(value) {
        return String(value || '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
      }
      function certAwardOptions(selected) {
        const awards = ['Stage 1','Stage 2','Stage 3','Stage 4','Stage 5','Stage 6','Self Rescue Award','National Curriculum'];
        return awards.map(award => `<option ${award === selected ? 'selected' : ''}>${award}</option>`).join('');
      }
      function buildCertPreview(template) {
        if (!template?.image) return '<div class="certificate-builder-empty">Upload a certificate image to preview placement.</div>';
        const dateHtml = template.showDate ? `<div class="certificate-builder-text" style="left:${template.dateX}%;top:${template.dateY}%;font-family:${escapeHtml(template.font)};font-size:${template.dateFontSize}px;color:${template.colour};">${new Date().toLocaleDateString('en-GB')}</div>` : '';
        return `<img src="${template.image}" alt="Certificate preview" />
          <div class="certificate-builder-text" style="left:${template.nameX}%;top:${template.nameY}%;font-family:${escapeHtml(template.font)};font-size:${template.fontSize}px;color:${template.colour};">Alex Smith</div>
          ${dateHtml}`;
      }
      function mountCertificateManager() {
        const certCard = Array.from(document.querySelectorAll('.card')).find(card => card.querySelector('h2')?.textContent?.trim() === 'Certificate templates');
        if (!certCard) return;
        if (certCard.querySelector('.stageflow-cert-manager')) return;
        certCard.querySelectorAll('[data-cert-builder], .stageflow-cert-manager').forEach(el => el.remove());
        renderCertificateManager(certCard);
      }
      function renderCertificateManager(certCard) {
        certCard.querySelectorAll('.stageflow-cert-manager').forEach(el => el.remove());
        let templates = loadCertTemplates();
        const activeId = activeCertId(templates);
        const active = templates.find(t => t.id === activeId);
        const root = document.createElement('section');
        root.className = 'card stageflow-cert-manager';
        root.innerHTML = `
          <h2>Certificate template library</h2>
          <p class="muted">Save each certificate once. Use Copy if your Stage 1-6 certificates share the same name/date placement.</p>
          <button class="btn org" data-cert-action="add">+ Add certificate template</button>
          <div data-cert-list>
            ${templates.length ? templates.map(template => `
              <div class="stageflow-cert-row" data-cert-row="${template.id}">
                <div><strong>${escapeHtml(template.name)}</strong><small>${escapeHtml(template.award)} · ${template.showDate ? 'date shown' : 'no date'} · ${template.image ? 'image uploaded' : 'no image yet'}</small></div>
                <button data-cert-action="edit" data-id="${template.id}">${template.id === activeId ? 'Open' : 'Edit'}</button>
                <button data-cert-action="copy" data-id="${template.id}">Copy</button>
                <button class="cert-delete" data-cert-action="delete" data-id="${template.id}">Delete</button>
              </div>`).join('') : '<div class="certificate-rule-row"><span>No certificate templates yet</span><span>Add Stage 1 first, then copy it for the others.</span></div>'}
          </div>
          ${active ? `
            <div class="stageflow-cert-editor" data-editor="${active.id}">
              <h2>Editing: ${escapeHtml(active.name)}</h2>
              <div class="grid2">
                <div class="card">
                  <div class="field"><label>Upload certificate image</label><input data-cert-input="file" type="file" accept="image/*,.pdf" /></div>
                  <div class="field"><label>Template name</label><input data-cert-input="name" value="${escapeHtml(active.name)}" /></div>
                  <div class="field"><label>This certificate is for</label><select data-cert-input="award">${certAwardOptions(active.award)}</select></div>
                  <div class="field"><label>Font</label><select data-cert-input="font"><option ${active.font === 'Arial' ? 'selected' : ''}>Arial</option><option ${active.font === 'Georgia' ? 'selected' : ''}>Georgia</option><option ${active.font === 'Trebuchet MS' ? 'selected' : ''}>Trebuchet MS</option><option ${active.font === 'Comic Sans MS' ? 'selected' : ''}>Comic Sans MS</option><option ${active.font === 'Audiowide' ? 'selected' : ''}>Audiowide</option></select></div>
                  <div class="field"><label>Text colour</label><input data-cert-input="colour" type="color" value="${active.colour}" /></div>
                  <label class="pill"><input data-cert-input="showDate" type="checkbox" ${active.showDate ? 'checked' : ''} /> Print date on certificate</label>
                  <div class="cert-control-panel"><h3>Move learner name</h3><div class="cert-control-grid"><button data-cert-move="nameY" data-step="-1">Name up</button><button data-cert-move="nameY" data-step="1">Name down</button><button data-cert-move="nameX" data-step="-1">Name left</button><button data-cert-move="nameX" data-step="1">Name right</button><button data-cert-move="fontSize" data-step="-2">Name smaller</button><button data-cert-move="fontSize" data-step="2">Name bigger</button></div></div>
                  ${active.showDate ? `<div class="cert-control-panel"><h3>Move date</h3><div class="cert-control-grid"><button data-cert-move="dateY" data-step="-1">Date up</button><button data-cert-move="dateY" data-step="1">Date down</button><button data-cert-move="dateX" data-step="-1">Date left</button><button data-cert-move="dateX" data-step="1">Date right</button><button data-cert-move="dateFontSize" data-step="-1">Date smaller</button><button data-cert-move="dateFontSize" data-step="1">Date bigger</button></div></div>` : ''}
                  <button class="btn org" data-cert-action="save">Save and collapse</button>
                </div>
                <div class="card"><h3>Live preview</h3><div class="certificate-builder-preview">${buildCertPreview(active)}</div></div>
              </div>
            </div>` : ''}
          <section class="card"><h3>Generation rule</h3><p class="muted">One stage certificate per learner: highest earned stage only. National Curriculum is separate and can be generated as an extra certificate.</p><div>${certificateEligibilityRows().map(row => `<div class="certificate-rule-row"><span>${escapeHtml(row.name)}</span><span>${escapeHtml(row.award)}</span></div>`).join('') || '<div class="certificate-rule-row"><span>No learner data yet</span><span>Add learners and stages to preview output</span></div>'}</div></section>
        `;
        certCard.appendChild(root);
        function saveAndRerender(nextTemplates) {
          saveCertTemplates(nextTemplates);
          renderCertificateManager(certCard);
        }
        root.addEventListener('click', event => {
          const button = event.target.closest('[data-cert-action], [data-cert-move]');
          if (!button) return;
          const action = button.getAttribute('data-cert-action');
          const move = button.getAttribute('data-cert-move');
          templates = loadCertTemplates();
          const currentId = activeCertId(templates);
          if (action === 'add') {
            const next = { ...certTemplateDefaults(), id: 'cert-' + Date.now(), name: 'New certificate template' };
            setActiveCertId(next.id);
            saveAndRerender([...templates, next]);
          }
          if (action === 'edit') {
            setActiveCertId(button.getAttribute('data-id'));
            renderCertificateManager(certCard);
          }
          if (action === 'copy') {
            const source = templates.find(t => t.id === button.getAttribute('data-id'));
            if (!source) return;
            const copy = { ...source, id: 'cert-' + Date.now(), name: source.name + ' copy' };
            setActiveCertId(copy.id);
            saveAndRerender([...templates, copy]);
          }
          if (action === 'delete') {
            const id = button.getAttribute('data-id');
            const template = templates.find(t => t.id === id);
            if (!template || !window.confirm(`Delete ${template.name}?`)) return;
            const next = templates.filter(t => t.id !== id);
            setActiveCertId(next[0]?.id || '');
            saveAndRerender(next);
          }
          if (action === 'save') {
            setActiveCertId('');
            renderCertificateManager(certCard);
          }
          if (move && currentId) {
            const step = Number(button.getAttribute('data-step')) || 0;
            const next = templates.map(template => {
              if (template.id !== currentId) return template;
              const min = move.toLowerCase().includes('size') ? 8 : 0;
              const max = move.toLowerCase().includes('size') ? 120 : 100;
              return { ...template, [move]: clampCert((template[move] ?? certTemplateDefaults()[move]) + step, min, max) };
            });
            saveAndRerender(next);
          }
        });
        root.addEventListener('input', event => updateFromInput(event));
        root.addEventListener('change', event => updateFromInput(event));
        function updateFromInput(event) {
          const input = event.target.closest('[data-cert-input]');
          if (!input) return;
          templates = loadCertTemplates();
          const currentId = activeCertId(templates);
          const key = input.getAttribute('data-cert-input');
          if (key === 'file') {
            const file = input.files?.[0];
            if (!file) return;
            if (file.type === 'application/pdf') {
              alert('PDF upload will be added later. For now, upload a PNG or JPG certificate image.');
              return;
            }
            const reader = new FileReader();
            reader.onload = () => saveAndRerender(templates.map(t => t.id === currentId ? { ...t, image: reader.result } : t));
            reader.readAsDataURL(file);
            return;
          }
          const value = key === 'showDate' ? input.checked : input.value;
          saveAndRerender(templates.map(t => t.id === currentId ? { ...t, [key]: value } : t));
        }
      }
      document.addEventListener('change', function (event) {
        const select = event.target.closest('select');
        if (!select) return;
        const field = select.closest('.field');
        const label = field?.querySelector('label')?.textContent || '';
        const stroke = distanceStrokeFromLabel(label);
        if (!stroke) return;
        const metres = distanceValue(select.value);
        setTimeout(() => clickMatchingPassButtons(stroke, metres), 80);
      }, true);
      document.addEventListener('focusin', reorderStageSelects, true);
      new MutationObserver(() => { reorderStageSelects(); mountCertificateManager(); }).observe(document.documentElement, { childList: true, subtree: true });
      window.addEventListener('load', () => { reorderStageSelects(); mountCertificateManager(); });
    </script>
    <script type="module" src="/app/main.jsx"></script>
  </body>
</html>
