<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet" />
    <style>
      .brand,
      .hero h1,
      main > .card h1 {
        font-family: 'Audiowide', Inter, ui-sans-serif, system-ui, sans-serif;
        letter-spacing: -0.025em;
      }
      .hero h1 {
        line-height: 1.08;
      }
      .certificate-builder-preview {
        position: relative;
        overflow: hidden;
        border: 1px solid #d9dee8;
        border-radius: 6px;
        background: #f8fafc;
        min-height: 260px;
        display: grid;
        place-items: center;
      }
      .certificate-builder-preview img {
        width: 100%;
        height: auto;
        display: block;
      }
      .certificate-builder-text {
        position: absolute;
        transform: translate(-50%, -50%);
        font-weight: 900;
        white-space: nowrap;
        text-align: center;
        text-shadow: 0 1px 2px rgba(255,255,255,.85);
        pointer-events: none;
      }
      .certificate-builder-empty {
        padding: 28px;
        text-align: center;
        color: #64748b;
        font-weight: 900;
      }
      .certificate-rule-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid #d9dee8;
        border-left: 4px solid #f97316;
        border-radius: 4px;
        padding: 9px 10px;
        margin-top: 8px;
        background: #f8fafc;
        font-weight: 900;
      }
      .certificate-rule-row span:last-child {
        color: #64748b;
        text-align: right;
      }
      @media (max-width: 850px) {
        .rail button:nth-child(2):after {
          content: 'Timetable' !important;
          font-size: 9px !important;
        }
        .certificate-rule-row {
          display: block;
        }
        .certificate-rule-row span:last-child {
          display: block;
          text-align: left;
          margin-top: 4px;
        }
      }
    </style>
    <title>StageFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('click', function (event) {
        const button = event.target.closest('button');
        if (!button) return;
        const label = (button.textContent || '').trim().toLowerCase();
        const isReset = label === 'reset' || label === 'reset app data';
        const isDelete = label === 'delete';
        if (isReset && !window.confirm('Reset StageFlow demo data on this device? This clears your local test changes.')) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
        if (isDelete && !window.confirm('Delete this lesson and its linked learners from this demo?')) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
      }, true);

      function distanceValue(value) {
        return parseInt(String(value || '0').replace('m', ''), 10) || 0;
      }
      function distanceStrokeFromLabel(label) {
        const text = String(label || '').toLowerCase();
        if (text.includes('front')) return 'front';
        if (text.includes('back')) return 'back';
        return '';
      }
      function criteriaMatchesDistance(criteria, stroke, metres) {
        const text = String(criteria || '').toLowerCase();
        const match = text.match(/(\d+)\s*m/);
        if (!match) return false;
        const needed = Number(match[1]);
        if (needed > metres) return false;
        const frontLike = text.includes('front') || text.includes('crawl');
        const backLike = text.includes('back') || text.includes('backstroke');
        const anyStroke = text.includes('choice of stroke') || text.includes('optional') || text.includes('distance achieved');
        if (stroke === 'front') return frontLike || anyStroke;
        if (stroke === 'back') return backLike || anyStroke;
        return false;
      }
      function clickMatchingPassButtons(stroke, metres) {
        document.querySelectorAll('.criteria').forEach(card => {
          const label = card.querySelector('b')?.textContent || '';
          if (!criteriaMatchesDistance(label, stroke, metres)) return;
          const buttons = Array.from(card.querySelectorAll('button'));
          const passButton = buttons.find(btn => (btn.textContent || '').trim().toLowerCase() === 'pass');
          if (passButton && !passButton.className.includes('org')) passButton.click();
        });
      }
      function stageOrderValue(text) {
        const label = String(text || '').toLowerCase();
        const match = label.match(/stage\s*(\d+)/);
        if (match) return Number(match[1]);
        if (label.includes('self rescue')) return 900;
        if (label.includes('water safety')) return 901;
        if (label.includes('award')) return 902;
        return 800;
      }
      function reorderStageSelects() {
        document.querySelectorAll('.field').forEach(field => {
          const label = field.querySelector('label')?.textContent || '';
          if (!label.toLowerCase().includes('current working stage')) return;
          const select = field.querySelector('select');
          if (!select || select.dataset.stageSorted === 'yes') return;
          const current = select.value;
          const options = Array.from(select.options).sort((a, b) => stageOrderValue(a.textContent) - stageOrderValue(b.textContent));
          options.forEach(option => select.appendChild(option));
          select.value = current;
          select.dataset.stageSorted = 'yes';
        });
      }
      function certDefaults() {
        return {
          name: 'Stage certificate template',
          award: 'Stage 1',
          font: 'Arial',
          fontSize: 36,
          colour: '#1e3a8a',
          nameX: 50,
          nameY: 43,
          dateX: 50,
          dateY: 64,
          image: ''
        };
      }
      function loadCertTemplate() {
        try { return { ...certDefaults(), ...(JSON.parse(localStorage.getItem('stageflow-certificate-template') || '{}')) }; }
        catch { return certDefaults(); }
      }
      function saveCertTemplate(data) {
        localStorage.setItem('stageflow-certificate-template', JSON.stringify(data));
      }
      function stageNumber(stage) {
        const match = String(stage || '').match(/Stage\s*(\d+)/i);
        return match ? Number(match[1]) : 0;
      }
      function loadStageFlowState() {
        try { return JSON.parse(localStorage.getItem('stageflow-state') || '{}'); }
        catch { return {}; }
      }
      function nationalCurriculumEarned(learner) {
        const nc = learner?.nc || {};
        const required = ['25m front crawl', '25m backstroke', '10m butterfly or breaststroke', 'Water Safety Award completed'];
        return required.every(item => !!nc[item]);
      }
      function certificateEligibilityRows() {
        const app = loadStageFlowState();
        const learners = Array.isArray(app.learners) ? app.learners : [];
        if (!learners.length) return [];
        return learners.map(learner => {
          const stage = stageNumber(learner.stage) ? learner.stage : 'No stage certificate yet';
          const nc = nationalCurriculumEarned(learner) ? ' + National Curriculum' : '';
          return { name: learner.name || 'Unnamed learner', award: `${stage}${nc}` };
        });
      }
      function buildCertificateUploader(target) {
        if (!target || target.dataset.certBuilder === 'yes') return;
        target.dataset.certBuilder = 'yes';
        const data = loadCertTemplate();
        const card = document.createElement('section');
        card.className = 'card';
        card.innerHTML = `
          <h2>Certificate upload + placement builder</h2>
          <p class="muted">Upload a blank certificate, choose the award/stage, then position the printed learner name and date.</p>
          <div class="grid2">
            <div class="card">
              <div class="field"><label>Upload certificate image</label><input data-cert="file" type="file" accept="image/*,.pdf" /></div>
              <div class="field"><label>Template name</label><input data-cert="name" /></div>
              <div class="field"><label>Award / stage</label><select data-cert="award"><option>Stage 1</option><option>Stage 2</option><option>Stage 3</option><option>Stage 4</option><option>Stage 5</option><option>Stage 6</option><option>Self Rescue Award</option><option>National Curriculum</option></select></div>
              <div class="grid2">
                <div class="field"><label>Name X %</label><input data-cert="nameX" type="number" min="0" max="100" /></div>
                <div class="field"><label>Name Y %</label><input data-cert="nameY" type="number" min="0" max="100" /></div>
                <div class="field"><label>Date X %</label><input data-cert="dateX" type="number" min="0" max="100" /></div>
                <div class="field"><label>Date Y %</label><input data-cert="dateY" type="number" min="0" max="100" /></div>
              </div>
              <div class="grid2">
                <div class="field"><label>Font</label><select data-cert="font"><option>Arial</option><option>Georgia</option><option>Trebuchet MS</option><option>Comic Sans MS</option><option>Audiowide</option></select></div>
                <div class="field"><label>Font size</label><input data-cert="fontSize" type="number" min="12" max="90" /></div>
              </div>
              <div class="field"><label>Text colour</label><input data-cert="colour" type="color" /></div>
              <button class="btn org" data-cert="save">Save certificate template</button>
            </div>
            <div class="card">
              <h3>Live preview</h3>
              <div class="certificate-builder-preview" data-cert="preview"></div>
            </div>
          </div>
          <section class="card">
            <h3>Generation rule</h3>
            <p class="muted">StageFlow will generate one stage certificate per learner: their highest earned stage only. National Curriculum is separate, so it can be generated in addition to the highest stage certificate.</p>
            <div data-cert="eligible"></div>
          </section>
        `;
        target.appendChild(card);
        function get(key) { return card.querySelector(`[data-cert="${key}"]`); }
        function syncFields() {
          ['name','award','font','fontSize','colour','nameX','nameY','dateX','dateY'].forEach(key => { const el = get(key); if (el) el.value = data[key]; });
        }
        function renderEligibility() {
          const holder = get('eligible');
          const rows = certificateEligibilityRows();
          if (!holder) return;
          holder.innerHTML = rows.length
            ? rows.map(row => `<div class="certificate-rule-row"><span>${row.name}</span><span>${row.award}</span></div>`).join('')
            : '<div class="certificate-rule-row"><span>No learner data yet</span><span>Add learners and stages to preview output</span></div>';
        }
        function renderPreview() {
          const preview = get('preview');
          preview.innerHTML = data.image ? `<img src="${data.image}" alt="Certificate preview" />` : '<div class="certificate-builder-empty">Upload a certificate image to preview placement.</div>';
          if (data.image) {
            const name = document.createElement('div');
            name.className = 'certificate-builder-text';
            name.textContent = 'Alex Smith';
            name.style.left = data.nameX + '%';
            name.style.top = data.nameY + '%';
            name.style.fontFamily = data.font;
            name.style.fontSize = data.fontSize + 'px';
            name.style.color = data.colour;
            const date = document.createElement('div');
            date.className = 'certificate-builder-text';
            date.textContent = new Date().toLocaleDateString('en-GB');
            date.style.left = data.dateX + '%';
            date.style.top = data.dateY + '%';
            date.style.fontFamily = data.font;
            date.style.fontSize = Math.max(14, Number(data.fontSize) * 0.55) + 'px';
            date.style.color = data.colour;
            preview.appendChild(name);
            preview.appendChild(date);
          }
          renderEligibility();
        }
        function updateData(key, value) {
          data[key] = ['fontSize','nameX','nameY','dateX','dateY'].includes(key) ? Number(value) : value;
          saveCertTemplate(data);
          renderPreview();
        }
        syncFields();
        renderPreview();
        card.querySelectorAll('[data-cert]').forEach(el => {
          const key = el.getAttribute('data-cert');
          if (!key || ['file','save','preview','eligible'].includes(key)) return;
          el.addEventListener('input', () => updateData(key, el.value));
          el.addEventListener('change', () => updateData(key, el.value));
        });
        get('file').addEventListener('change', event => {
          const file = event.target.files?.[0];
          if (!file) return;
          if (file.type === 'application/pdf') {
            alert('PDF upload will be added later. For this first demo, upload a PNG or JPG certificate image.');
            return;
          }
          const reader = new FileReader();
          reader.onload = () => updateData('image', reader.result);
          reader.readAsDataURL(file);
        });
        get('save').addEventListener('click', () => {
          saveCertTemplate(data);
          alert(`Saved ${data.name} for ${data.award}.`);
        });
      }
      function mountCertificateBuilder() {
        const cards = Array.from(document.querySelectorAll('.card'));
        const certCard = cards.find(card => card.querySelector('h2')?.textContent?.trim() === 'Certificate templates');
        if (certCard) buildCertificateUploader(certCard);
      }
      document.addEventListener('change', function (event) {
        const select = event.target.closest('select');
        if (!select) return;
        const field = select.closest('.field');
        const label = field?.querySelector('label')?.textContent || '';
        const stroke = distanceStrokeFromLabel(label);
        if (!stroke) return;
        const metres = distanceValue(select.value);
        setTimeout(() => clickMatchingPassButtons(stroke, metres), 80);
      }, true);
      document.addEventListener('focusin', reorderStageSelects, true);
      new MutationObserver(() => { reorderStageSelects(); mountCertificateBuilder(); }).observe(document.documentElement, { childList: true, subtree: true });
      window.addEventListener('load', () => { reorderStageSelects(); mountCertificateBuilder(); });
    </script>
    <script type="module" src="/app/main.jsx"></script>
  </body>
</html>
