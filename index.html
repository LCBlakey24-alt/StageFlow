<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet" />
    <style>
      .brand,
      .hero h1,
      main > .card h1 {
        font-family: 'Audiowide', Inter, ui-sans-serif, system-ui, sans-serif;
        letter-spacing: -0.025em;
      }
      .hero h1 {
        line-height: 1.08;
      }
      .health-ready {
        border-top: 5px solid #f97316;
        background: linear-gradient(135deg, #ffffff 0%, #fff7ed 100%);
      }
      .health-ready strong {
        display: block;
        font-size: 18px;
        margin-bottom: 4px;
      }
      .health-section-title {
        margin-top: 14px;
        margin-bottom: 8px;
        font-weight: 1000;
        letter-spacing: -0.025em;
      }
      .health-pass {
        border-left-color: #2563eb !important;
      }
      .health-warning {
        border-left-color: #f97316 !important;
        background: #fff7ed !important;
      }
    </style>
    <title>StageFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('click', function (event) {
        const button = event.target.closest('button');
        if (!button) return;
        const label = (button.textContent || '').trim().toLowerCase();
        const isReset = label === 'reset' || label === 'reset app data';
        const isDelete = label === 'delete';
        if (isReset && !window.confirm('Reset StageFlow demo data on this device? This clears your local test changes.')) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
        if (isDelete && !window.confirm('Delete this lesson and its linked learners from this demo?')) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
      }, true);

      function polishHealthScreen() {
        const main = document.querySelector('main');
        if (!main || main.dataset.healthPolished === 'yes') return;
        const heroTitle = main.querySelector('.hero h1');
        if (!heroTitle || !heroTitle.textContent.toLowerCase().includes('stability health check')) return;

        const scoreText = main.textContent.match(/(\d+)% of automatic checks are passing|Automatic stability score\s*(\d+)%/i);
        const percent = scoreText ? Number(scoreText[1] || scoreText[2] || 0) : 0;
        const ready = percent >= 100;
        const summary = document.createElement('section');
        summary.className = 'card health-ready';
        summary.innerHTML = ready
          ? '<strong>✅ Priority 1 ready for sign-off</strong><p class="muted">Automatic checks are passing. Run the manual route once on your phone, then move to Priority 2: Timetable completion.</p>'
          : '<strong>⚠️ Priority 1 still needs a final check</strong><p class="muted">Automatic checks are not all passing yet. Fix anything listed under Needs fixing before moving on.</p>';
        const firstGrid = main.querySelector('.grid');
        if (firstGrid && firstGrid.nextSibling) firstGrid.parentNode.insertBefore(summary, firstGrid.nextSibling);

        const checkCard = Array.from(main.querySelectorAll('.card')).find(card => card.querySelector('h2')?.textContent.trim() === 'Automatic checks');
        if (!checkCard || checkCard.dataset.split === 'yes') return;
        const folders = Array.from(checkCard.querySelectorAll('.folder'));
        const passed = folders.filter(f => f.textContent.trim().startsWith('✅'));
        const warnings = folders.filter(f => f.textContent.trim().startsWith('⚠️'));
        folders.forEach(f => f.remove());

        const passedTitle = document.createElement('h3');
        passedTitle.className = 'health-section-title';
        passedTitle.textContent = `✅ Passed (${passed.length})`;
        checkCard.appendChild(passedTitle);
        passed.forEach(f => { f.classList.add('health-pass'); checkCard.appendChild(f); });

        const warningTitle = document.createElement('h3');
        warningTitle.className = 'health-section-title';
        warningTitle.textContent = `⚠️ Needs fixing (${warnings.length})`;
        checkCard.appendChild(warningTitle);
        if (!warnings.length) {
          const ok = document.createElement('div');
          ok.className = 'folder health-pass';
          ok.textContent = '✅ Nothing currently flagged by automatic checks.';
          checkCard.appendChild(ok);
        } else {
          warnings.forEach(f => { f.classList.add('health-warning'); checkCard.appendChild(f); });
        }

        const manualCard = Array.from(main.querySelectorAll('.card')).find(card => card.querySelector('h2')?.textContent.trim() === 'Manual live test route');
        if (manualCard) {
          const intro = manualCard.querySelector('.muted');
          if (intro) intro.textContent = 'Run this once after each Vercel redeploy. If every step works on your phone, Priority 1 is complete.';
        }
        main.dataset.healthPolished = 'yes';
      }

      const observer = new MutationObserver(() => {
        const main = document.querySelector('main');
        if (main) delete main.dataset.healthPolished;
        polishHealthScreen();
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });
      window.addEventListener('load', polishHealthScreen);
    </script>
    <script type="module" src="/app/main.jsx"></script>
  </body>
</html>
